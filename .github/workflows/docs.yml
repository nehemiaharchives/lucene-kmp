name: Docs

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - '**/src/**/*.kt'
      - '**/src/**/*.kts'
      - '**/build.gradle.kts'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'README.md'
      - 'LICENSE*'
      - '.github/workflows/docs.yml'
      - 'scripts/build-docs-site.sh'
  pull_request:
    paths:
      - 'docs/**'
      - '**/src/**/*.kt'
      - '**/src/**/*.kts'
      - '**/build.gradle.kts'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'README.md'
      - 'LICENSE*'
      - '.github/workflows/docs.yml'
      - 'scripts/build-docs-site.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
      NODE_VERSION: 24
      JAVA_VERSION: 24
      TZ: Asia/Tokyo
      HUGO_ENVIRONMENT: production
      HUGO_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo extended
        run: |
          curl -sL -o "${{ runner.temp }}/hugo.tar.gz" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xzf "${{ runner.temp }}/hugo.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Install website dependencies
        working-directory: docs
        run: npm ci

      - name: Verify tool versions
        run: |
          java -version
          ./gradlew --version
          node --version
          npm --version
          hugo version
          docs/node_modules/.bin/sass --version

      - name: Build Doks site and Dokka API docs
        env:
          BASE_URL: ${{ steps.pages.outputs.base_url }}/
          DOKKA_TASK: :dokkaGenerate
          DOKKA_OUTPUT_DIR: build/dokka/html
          GRADLE_ARGS: --no-daemon --max-workers=2
        run: scripts/build-docs-site.sh

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/public

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
