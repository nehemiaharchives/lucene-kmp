    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        if: ${{ matrix.platform == 'jvm' }}
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Set up Android SDK
        if: ${{ matrix.needs_android }}
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Konan cache
        if: ${{ matrix.needs_konan_cache }}
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      # tests other than core-index will run this
      - name: Run tests
        if: ${{ matrix.module_name != 'core-index' }}
        run: >
          ./gradlew
          -PenableHangDetection=true
          --console=plain
          ${{ matrix.task }}
          ${{ matrix.package_filter || '' }}

      # core-index tests are split into 3 parts for debugging purpose
      - name: Run core-index tests 2-F
        if: ${{ matrix.module_name == 'core-index' }}
        run:  |
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*Test2*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestA*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestB*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestC*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestD*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestE*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestF*"

      - name: Run core-index tests I
        if: ${{ matrix.module_name == 'core-index' }}
        run:  |
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestI*"

      - name: Run core-index tests K-U
        if: ${{ matrix.module_name == 'core-index' }}
        run:  |
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestK*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestL*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestM*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestN*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestO*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestP*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestR*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestS*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestT*"
          ./gradlew -PenableHangDetection=true --console=plain ${{ matrix.task }} --tests "org.gnit.lucenekmp.index*TestU*"   

      - name: Upload build reports
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            **/build/reports/
            **/build/test-results/

      - name: Build Summary
        if: always()
        run: |
          echo "### ${{ matrix.platform }} \- ${{ matrix.module_name }} Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "* Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "* Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "* Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY

