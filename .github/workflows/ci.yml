# lucene-kmp/.github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '**.sh'
      - '**.main.kts'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '**.sh'
      - '**.main.kts'
  workflow_dispatch:
    inputs:
      test-core-index:
        description: "Run split core-index debug groups (linux core-index only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  tests:
    name: Test (${{ matrix.platform }}/${{ matrix.module_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}
